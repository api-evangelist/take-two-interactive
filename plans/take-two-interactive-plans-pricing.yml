description: Take-Two Interactive (parent of Rockstar Games, 2K, and Zynga) does not publish a
  public developer API pricing page at the corporate level. Game-platform integrations are handled
  through individual studio partnerships rather than a unified Take-Two developer plan.
sources:
  - https://www.take2games.com/
notes: No public API pricing surface at the corporate Take-Two level. Studio-level platforms (Rockstar,
  2K, Zynga) publish their own SDKs and partner programs separately. Plans collapsed to a single
  Contact Sales entry.
plans:
  - id: take-two-interactive-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-negotiated business development and partnership engagement with Take-Two
      Interactive or its studios. No self-serve developer plan tier is published at the corporate
      level.
    entries:
      - label: Custom Engagement
        name: custom_engagement
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Studio Partnership
      - name: Custom Scoping
      - name: Business Development
