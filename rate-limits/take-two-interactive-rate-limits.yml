description: Take-Two Interactive does not publish public rate-limit documentation at the corporate
  level. Any rate-limit policies are scoped to individual studio platforms (Rockstar, 2K, Zynga)
  and their respective partner agreements.
sources:
  - https://www.take2games.com/
notes: No public rate-limit documentation at corporate level. Studio platforms govern their own
  policies under separate partner agreements.
responseCodes:
  throttled: 429
limits:
  - name: Studio / partner contract limits
    scope: account
    metric: varies
    limit: see studio partner agreement
policies:
  - name: Studio-Level Governance
    description: Rate-limit and throttling behavior is owned by individual studio platforms and
      defined under their respective partnership or SDK agreements rather than at the Take-Two
      corporate layer.
