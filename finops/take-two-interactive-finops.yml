principles:
  - name: Visibility
    description: Cost and consumption visibility is provided through individual studio partner
      portals (Rockstar, 2K, Zynga) rather than a unified Take-Two surface.
  - name: Allocation
    description: Allocation is performed against studio-level invoices and partner statements in
      the consumer's own finance system.
  - name: Optimization
    description: Optimization is handled through commercial review with the relevant studio business
      development team.
  - name: Accountability
    description: Accountability sits with the partner team that owns the studio relationship.
